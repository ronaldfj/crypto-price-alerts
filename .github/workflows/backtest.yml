name: Backtest Manual

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Símbolo (vacío = todos)'
        required: false
        default: ''
      months:
        description: 'Meses de histórico'
        required: false
        default: '12'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Backtest
        env:
          DATA_SOURCE_ORDER: okx,bybit
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.symbol }}" ] && ARGS="$ARGS --symbol ${{ github.event.inputs.symbol }}"
          ARGS="$ARGS --months ${{ github.event.inputs.months }}"
          python backtester.py $ARGS
