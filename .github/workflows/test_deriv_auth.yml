name: Test Deriv Authentication

on:
  workflow_dispatch:

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar websockets
        run: pip install websockets

      - name: Probar autenticación en Deriv
        env:
          DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
        run: |
          python -c "
          import asyncio
          import websockets
          import json
          import os

          async def test():
              token = os.environ['DERIV_API_TOKEN']
              app_id = os.environ.get('DERIV_APP_ID', '1089')
              uri = f'wss://ws.derivws.com/websockets/v3?app_id={app_id}'
              print(f'Conectando a {uri}...')
              async with websockets.connect(uri) as ws:
                  print('Enviando autorización...')
                  await ws.send(json.dumps({'authorize': token}))
                  resp = await ws.recv()
                  data = json.loads(resp)
                  print('Respuesta:', json.dumps(data, indent=2))
                  if 'error' in data:
                      print('ERROR:', data['error']['message'])
                  else:
                      print('Autenticación exitosa. Cuenta:', data.get('authorize', {}).get('account_type'))

          asyncio.run(test())
          "
