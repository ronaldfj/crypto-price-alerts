name: Crypto Alert Bot

on:
  schedule:
    - cron: '0 * * * *' # Ejecución cada 4 horas
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

jobs:
  run-alert:
    runs-on: ubuntu-latest
    # Fuerza el uso de Node 24 para eliminar advertencias de depreciación
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2 # Versión actualizada con soporte nativo

      - name: Setup Python
        uses: actions/setup-python@v5.3.0 # Versión optimizada para Node 24
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4.2.0 # Elimina el aviso de depreciación en los logs
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Ejecutar script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python alert.py

      - name: Commit and push state
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add alert_state.json
          git commit -m "Update alert state [skip ci]" || exit 0
          git push
