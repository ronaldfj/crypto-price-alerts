name: Daily Summary

on:
  schedule:
    # 21:00 UTC = 4:00pm Colombia/México (UTC-5)
    - cron: '0 21 * * *'
  workflow_dispatch:  # Trigger manual para probar

jobs:
  send-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'  # cachea ~/.cache/pip por hash de requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 daily_summary.py --hours 24
