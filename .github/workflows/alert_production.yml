name: Crypto Alert Bot - Production

on:
  schedule:
    # Ejecutar cada 4 horas (cadencia de 4H candles)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Trigger manual

permissions:
  contents: write  # Necesario para el push de "Commit DB changes" abajo

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # cachea ~/.cache/pip por hash de requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alert Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: 'true'
          MIN_SCORE: '7.0'
          MIN_ADX: '20.0'
          ENABLE_EXECUTION_QUALITY_GATE: 'true'
          ENABLE_RSI_CONFIRMATION: 'true'
          ENABLE_ENTRY_WINDOW_GATE: 'true'
          MAX_ENTRY_SLIP_PCT: '2.0'
          ENABLE_OUTCOME_VALIDATION: 'true'
        run: python3 alert.py

      - name: Upload alerts state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alerts-state-db
          path: alerts_state.db
          retention-days: 30

      - name: Commit DB changes
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add alerts_state.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update alerts state [skip ci]" && git pull --rebase origin main && git push)

