import os
import json
import urllib.request

TOKEN = os.getenv("TELEGRAM_BOT_TOKEN")
CHAT_ID = os.getenv("TELEGRAM_CHAT_ID")

if not TOKEN or not CHAT_ID:
    raise ValueError("Faltan TELEGRAM_BOT_TOKEN o TELEGRAM_CHAT_ID")

alert_id = 999
side = "LONG"
entry_price = 50000.0
stop_loss = 49500.0
take_profit = 51000.0

payload = json.dumps({
    "id": alert_id,
    "side": side,
    "entry": entry_price,
    "sl": stop_loss,
    "tp": take_profit
})
if len(payload) > 64:
    payload = json.dumps({"id": alert_id})

keyboard = {
    "inline_keyboard": [[
        {"text": "✅ ENTRAR", "callback_data": f"enter:{payload}"},
        {"text": "❌ RECHAZAR", "callback_data": f"reject:{payload}"}
    ]]
}

text = (
    "🔔 <b>ALERTA DE PRUEBA</b>\n"
    f"Lado: {side}\n"
    f"Entry: {entry_price}\n"
    f"SL: {stop_loss}\n"
    f"TP: {take_profit}\n"
    "Pulsa botón para probar integración con Deriv."
)

url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
data = {
    "chat_id": CHAT_ID,
    "text": text,
    "reply_markup": keyboard,
    "parse_mode": "HTML"
}
req = urllib.request.Request(url, data=json.dumps(data).encode('utf-8'), headers={'Content-Type': 'application/json'})
try:
    with urllib.request.urlopen(req) as response:
        print("Mensaje enviado. Código:", response.getcode())
except Exception as e:
    print("Error:", e)
